<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ref Coach Pro</title>
    
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIlJlZiBDb2FjaCBQcm8iLAogICJzaG9ydF9uYW1lIjogIlJlZkxvZ2dlciIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMGYxNzJhIiwKICAidGhlbWVfY29sb3IiOiAiIzBmMTcyYSIsCiAgImljb25zIjogWwogICAgewogICAgICAic3JjIjogImh0dHBzOi8vY2RuLWljb25zLXBuZy5mbGF0aWNvbi5jb20vNTEyLzgwNy84MDczNjcucG5nIiwKICAgICAgInNpemVzIjogIjUxMng1MTIiLAogICAgICAidHlwZSI6ICJpbWFnZS9wbmciCiAgICB9CiAgXQp9">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        button { touch-action: manipulation; transition: all 0.1s ease; }
        button:active { transform: scale(0.95); opacity: 0.8; }
        .selected { background-color: #3b82f6 !important; color: white !important; border-color: #2563eb !important; }
        .diff-selected { background-color: #1e293b !important; color: white !important; border-color: #0f172a !important; }
        .cmi-selected { background-color: #ef4444 !important; color: white !important; border-color: #dc2626 !important; box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); }
        .hidden { display: none; }
        
        .field-canvas { position: relative; width: 100%; height: 180px; background: #22c55e; border: 2px solid white; border-radius: 6px; }
        .field-line { position: absolute; border: 1.5px solid rgba(255,255,255,0.9); pointer-events: none; }
        .half-line { left: 50%; top: 0; bottom: 0; width: 0; }
        .center-circle { left: 50%; top: 50%; transform: translate(-50%, -50%); width: 45px; height: 45px; border-radius: 50%; }
        .pen-box-l { left: 0; top: 20%; width: 40px; height: 60%; border-left: none; }
        .pen-box-r { right: 0; top: 20%; width: 40px; height: 60%; border-right: none; }
        
        #pin { 
            position: absolute; width: 24px; height: 24px; 
            background: #ef4444; border: 3px solid white; border-radius: 50%; 
            transform: translate(-50%, -50%); display: none; z-index: 50; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.4); pointer-events: none;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans flex flex-col h-screen overflow-hidden text-sm">

    <header class="bg-slate-900 text-white p-3 pt-8 flex justify-between items-center shadow-md">
        <div id="timerDisplay" class="text-3xl font-mono font-bold text-green-400">00:00</div>
        <div class="flex gap-2">
            <button id="startTimerBtn" onclick="toggleTimer()" class="bg-green-600 px-4 py-2 rounded-lg font-bold uppercase text-xs">Start</button>
            <button onclick="resetTimer()" class="bg-gray-700 px-3 py-2 rounded-lg text-[10px] font-bold uppercase">Reset</button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-3 flex flex-col gap-4">
        <section>
            <h2 class="text-[10px] font-black text-gray-400 mb-1 uppercase tracking-widest">1. Official</h2>
            <div class="grid grid-cols-4 gap-1.5" id="who-group">
                <button onclick="selectSingle('who', 'Ref', this)" class="bg-white border border-gray-300 py-3 rounded-lg font-bold">REF</button>
                <button onclick="selectSingle('who', 'AR1', this)" class="bg-white border border-gray-300 py-3 rounded-lg font-bold">AR1</button>
                <button onclick="selectSingle('who', 'AR2', this)" class="bg-white border border-gray-300 py-3 rounded-lg font-bold">AR2</button>
                <button onclick="selectSingle('who', '4th', this)" class="bg-white border border-gray-300 py-3 rounded-lg font-bold">4th</button>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-center mb-1">
                <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-widest">2. Position</h2>
                <button onclick="toggleFieldDisplay()" class="text-[10px] bg-blue-100 px-3 py-1 rounded-full font-bold text-blue-700">MAP FIELD</button>
            </div>
            <div id="fieldSection" class="hidden">
                <div class="field-canvas" id="soccerField" onclick="dropPin(event)">
                    <div id="pin"></div>
                    <div class="field-line half-line"></div>
                    <div class="field-line center-circle"></div>
                    <div class="field-line pen-box-l"></div>
                    <div class="field-line pen-box-r"></div>
                </div>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-center mb-1">
                <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-widest">3. Incident Type</h2>
                <button onclick="clearMulti('what')" class="text-[10px] text-blue-600 font-bold">CLEAR</button>
            </div>
            <div class="grid grid-cols-3 gap-1.5" id="what-group">
                <button onclick="toggleMulti('what', 'Foul', this)" class="bg-white border border-gray-300 py-3 rounded-lg font-bold">Foul</button>
                <button onclick="handleOffsideToggle(this)" class="bg-white border border-gray-300 py-3 rounded-lg font-bold">Offside</button>
                <button onclick="toggleMulti('what', 'Advantage', this)" class="bg-white border border-gray-300 py-3 rounded-lg font-bold">Adv.</button>
                <button onclick="handleCMIToggle('Penalty', this)" class="bg-orange-50 border border-orange-300 py-3 rounded-lg font-bold text-orange-800">Penalty</button>
                <button onclick="handleCMIToggle('Yellow', this)" class="bg-yellow-50 border border-yellow-400 py-3 rounded-lg font-bold text-yellow-700">Yellow</button>
                <button onclick="handleCMIToggle('Red', this)" class="bg-red-50 border border-red-400 py-3 rounded-lg font-bold text-red-700">Red Card</button>
                <button onclick="handleGoalToggle(this)" class="bg-green-50 border border-green-400 py-3 rounded-lg font-bold text-green-700">Goal</button>
                <button onclick="handleCMIToggle('2nd Yellow', this)" class="bg-yellow-100 border-2 border-red-400 py-3 rounded-lg font-bold text-red-800 text-[10px]">2nd Yellow</button>
                <button onclick="toggleMulti('what', 'Mistaken ID', this)" class="bg-white border border-gray-300 py-3 rounded-lg font-bold text-[10px]">Mistaken ID</button>
            </div>

            <div id="conditional-options" class="mt-2 hidden">
                <button id="noFlagBtn" onclick="toggleMulti('what', 'No Flag', this)" class="w-full bg-indigo-100 border-2 border-indigo-400 py-3 rounded-lg font-black text-indigo-700">
                    OFFSIDE: No Flag / Stayed Down
                </button>
            </div>

            <div id="difficulty-options" class="mt-2 hidden bg-slate-200 p-2 rounded-lg">
                <p class="text-[9px] font-bold text-slate-500 uppercase mb-1">Difficulty</p>
                <div class="flex gap-1.5" id="difficulty-group">
                    <button onclick="selectDifficulty('RTN', this)" class="flex-1 bg-white border border-gray-400 py-2 rounded font-bold text-xs">ROUTINE</button>
                    <button onclick="selectDifficulty('DIF', this)" class="flex-1 bg-white border border-gray-400 py-2 rounded font-bold text-xs">DIFFICULT</button>
                    <button onclick="selectDifficulty('IMP', this)" class="flex-1 bg-white border border-gray-400 py-2 rounded font-bold text-xs">IMP</button>
                </div>
            </div>
        </section>

        <section>
            <div class="flex gap-1.5" id="rating-group">
                <button onclick="selectSingle('rating', 'Correct', this)" class="flex-1 bg-white border border-gray-300 py-4 rounded-xl font-black text-green-600">CORRECT</button>
                <button onclick="selectSingle('rating', 'Incorrect', this)" class="flex-1 bg-white border border-gray-300 py-4 rounded-xl font-black text-orange-500">INCORRECT</button>
                <button id="cmiToggle" onclick="toggleCMI()" class="flex-1 bg-white border border-red-200 py-4 rounded-xl font-black text-red-600">🚨 CMI</button>
            </div>
        </section>

        <section class="pb-6">
            <div class="flex gap-2">
                <input type="text" id="quickNote" placeholder="Notes..." class="flex-1 p-4 rounded-xl border border-gray-300">
                <button onclick="logEvent()" class="bg-blue-600 text-white font-black px-8 rounded-xl shadow-xl uppercase">Save</button>
            </div>
        </section>
    </main>

    <div class="h-40 bg-slate-100 p-3 overflow-y-auto border-t border-gray-300 font-mono text-[11px]" id="logList"></div>

    <script>
        // SERVICE WORKER FOR OFFLINE USE
        if ('serviceWorker' in navigator) {
            const swCode = `self.addEventListener('fetch', function(e) { e.respondWith(fetch(e.request)); });`;
            const blob = new Blob([swCode], {type: 'text/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }

        let currentSelection = { who: null, what: [], rating: null, isCMI: false, coords: null, difficulty: null };
        let timerInterval, seconds = 0, isRunning = false;

        function toggleFieldDisplay() { document.getElementById('fieldSection').classList.toggle('hidden'); }
        
        function dropPin(e) {
            const field = document.getElementById('soccerField');
            const pin = document.getElementById('pin');
            const rect = field.getBoundingClientRect();
            const x = Math.round((e.clientX - rect.left) / rect.width * 100);
            const y = Math.round((e.clientY - rect.top) / rect.height * 100);
            pin.style.left = x + '%'; pin.style.top = y + '%'; pin.style.display = 'block';
            currentSelection.coords = `[${x}%, ${y}%]`;
        }

        function handleOffsideToggle(element) {
            toggleMulti('what', 'Offside', element);
            checkDifficultyVisibility();
            checkAutoCMIs();
            document.getElementById('conditional-options').classList.toggle('hidden', !currentSelection.what.includes('Offside'));
        }

        function handleGoalToggle(element) { toggleMulti('what', 'Goal', element); checkAutoCMIs(); }
        function handleCMIToggle(val, element) { toggleMulti('what', val, element); checkDifficultyVisibility(); checkAutoCMIs(); }

        function checkAutoCMIs() {
            const list = currentSelection.what;
            if (list.some(i => ['Penalty', 'Red', '2nd Yellow'].includes(i)) || (list.includes('Offside') && list.includes('Goal'))) {
                currentSelection.isCMI = true;
                document.getElementById("cmiToggle").classList.add('cmi-selected');
            }
        }

        function checkDifficultyVisibility() {
            const hasTrigger = currentSelection.what.some(i => ['Penalty', 'Offside', 'Yellow', 'Red', '2nd Yellow'].includes(i));
            document.getElementById('difficulty-options').classList.toggle('hidden', !hasTrigger);
        }

        function selectDifficulty(val, element) {
            document.querySelectorAll('#difficulty-group button').forEach(b => b.classList.remove('diff-selected'));
            element.classList.add('diff-selected');
            currentSelection.difficulty = val;
        }

        function toggleTimer() {
            const btn = document.getElementById("startTimerBtn");
            if (isRunning) { clearInterval(timerInterval); btn.textContent = "Resume"; }
            else {
                timerInterval = setInterval(() => {
                    seconds++;
                    const mins = String(Math.floor(seconds / 60)).padStart(2, '0');
                    const secs = String(seconds % 60).padStart(2, '0');
                    document.getElementById("timerDisplay").textContent = `${mins}:${secs}`;
                }, 1000);
                btn.textContent = "Pause";
            }
            isRunning = !isRunning;
        }

        function selectSingle(cat, val, el) {
            document.querySelectorAll(`#${cat}-group button`).forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
            currentSelection[cat] = val;
        }

        function toggleMulti(cat, val, el) {
            if (currentSelection[cat].includes(val)) {
                currentSelection[cat] = currentSelection[cat].filter(i => i !== val);
                el.classList.remove('selected');
            } else {
                currentSelection[cat].push(val);
                el.classList.add('selected');
            }
        }

        function clearMulti(cat) {
            currentSelection[cat] = [];
            document.querySelectorAll(`#${cat}-group button`).forEach(b => b.classList.remove('selected', 'cmi-selected'));
            document.getElementById('conditional-options').classList.add('hidden');
            checkDifficultyVisibility();
        }

        function toggleCMI() {
            currentSelection.isCMI = !currentSelection.isCMI;
            document.getElementById("cmiToggle").classList.toggle('cmi-selected', currentSelection.isCMI);
        }

        function logEvent() {
            const list = document.getElementById("logList");
            const entry = document.createElement("div");
            entry.className = `p-2 mb-1 border-l-4 bg-white shadow-sm ${currentSelection.isCMI ? 'border-red-500' : 'border-blue-500'}`;
            
            let displayItems = [];
            let source = [...currentSelection.what];
            if (source.includes('Foul')) { displayItems.push('Foul'); source = source.filter(i => i !== 'Foul'); }
            if (source.includes('Offside')) { 
                displayItems.push(source.includes('No Flag') ? 'Offside (Flag Down)' : 'Offside'); 
                source = source.filter(i => i !== 'Offside' && i !== 'No Flag');
            }
            displayItems = displayItems.concat(source);

            entry.innerHTML = `
                <div class="flex justify-between font-bold">
                    <span>${document.getElementById("timerDisplay").textContent} | ${currentSelection.who || 'REF'}</span>
                    <span class="text-gray-400">${currentSelection.coords || ''}</span>
                </div>
                <div>
                    ${displayItems.join(" + ")} [${currentSelection.difficulty || 'NA'}] — ${currentSelection.rating || ''} 
                    ${currentSelection.isCMI ? '<b class="text-red-600">[CMI]</b>' : ''}
                </div>
            `;
            list.insertBefore(entry, list.firstChild);
            resetUI();
        }

        function resetUI() {
            currentSelection = { who: null, what: [], rating: null, isCMI: false, coords: null, difficulty: null };
            document.querySelectorAll('.selected, .cmi-selected, .diff-selected').forEach(el => el.classList.remove('selected', 'cmi-selected', 'diff-selected'));
            document.getElementById('conditional-options').classList.add('hidden');
            document.getElementById('difficulty-options').classList.add('hidden');
            document.getElementById('pin').style.display = 'none';
            document.getElementById('quickNote').value = "";
        }

        function resetTimer() { if(confirm("Reset?")) { clearInterval(timerInterval); seconds = 0; isRunning = false; document.getElementById("timerDisplay").textContent = "00:00"; } }
    </script>
</body>
</html>
